# k8s/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: server-service
  labels:
    app: server  # <--- Essential for discovery
spec:
  selector:
    app: server
  ports:
  - name: http-port # <--- Essential for ServiceMonitor
    port: 5000
    targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: client-service
  labels:
    app: client  # <--- Essential for discovery
spec:
  selector:
    app: client
  ports:
  - name: http-client # <--- Essential for ServiceMonitor
    port: 80
    targetPort: 3000